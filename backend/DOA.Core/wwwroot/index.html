<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D.O.A. Terminal</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <div class="terminal-window">
    <div class="terminal-header">
      D.O.A. — Duck Of Apocalypse Terminal
    </div>

    <div id="console" class="terminal-output"></div>

    <div class="terminal-input-row">
      <span class="prompt">D.O.A.&gt;</span>
      <input
        id="commandInput"
        class="command-input"
        type="text"
        autocomplete="off"
        spellcheck="false"
      />
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
